<!DOCTYPE html>
<html lang="en">
<head>
  <title>Glow Salon</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-inverse custom-navbar">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="#">Glow Salon</a>
    </div>
  </div>
</nav>

<div class="container text-center">
  <h1>Glow Salon & Beauty Studio</h1>
  <p>Experience luxury beauty care from professionals</p>

  <a href="booking.html" class="btn btn-warning">
    Book Appointment
  </a>
</div>

<!-- CONTACT -->
<div class="container text-center" style="margin-top:50px;">
  <h2>Contact Us</h2>

  <p><strong>Phone:</strong> 9876543210</p>
  <p><strong>Email:</strong> glowsalon@gmail.com</p>
  <p><strong>Location:</strong> Pune, India</p>

  <!-- NETLIFY FORM -->
  <form id="contactForm" name="contact" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="contact">

    <div class="form-group">
      <input type="text" name="name" class="form-control" placeholder="Your Name" required>
    </div>

    <div class="form-group">
      <input type="email" name="email" class="form-control" placeholder="Your Email" required>
    </div>

    <div class="form-group">
      <textarea name="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
    </div>

    <button type="submit" class="btn btn-warning btn-block">
      Send Message
    </button>
  </form>

  <h3 id="contactResult" class="text-center" style="margin-top:20px;"></h3>
</div>

<script src="./script.js"></script>

</body>
</html>
