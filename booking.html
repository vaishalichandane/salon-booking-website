<!DOCTYPE html>
<html lang="en">
<head>
  <title>Book Appointment</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-inverse">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="index.html">Glow Salon</a>
    </div>

    <ul class="nav navbar-nav navbar-right">
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Services</a></li>
      <li class="active"><a href="booking.html">Book Now</a></li>
    </ul>
  </div>
</nav>
<div class="container">
  <h2 class="text-center">Book an Appointment</h2>
  <p class="text-center">Fill the form below</p>

  <div class="row">
    <div class="col-sm-6 col-sm-offset-3">

      <form>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" class="form-control" placeholder="Enter mobile number">
        </div>

        <div class="form-group">
          <label>Select Service</label>
          <select class="form-control">
            <option>Haircut</option>
            <option>Facial</option>
            <option>Makeup</option>
          </select>
        </div>

        <div class="form-group">
          <label>Appointment Date</label>
          <input type="date" class="form-control">
        </div>

        <button class="btn btn-success btn-block" disabled>
          Book Appointment (JS will be added later)
        </button>

      </form>

    </div>
  </div>
</div>
<footer class="footer text-center">
  <div class="container">
    <p>© 2026 Glow Salon | All Rights Reserved</p>
    <p>Designed using HTML, CSS & Bootstrap</p>
  </div>
</footer>
</body>
</html>
