<!DOCTYPE html>
<html lang="en">
<head>
  <title>Book Appointment</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-inverse custom-navbar">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="index.html">Glow Salon</a>
    </div>
  </div>
</nav>

<div class="container">
  <h2 class="text-center">Book an Appointment</h2>
  <p class="text-center">Fill the form below</p>

  <p class="text-center">
    Call us: 9876543210 | Pune, India
  </p>

  <div class="row">
    <div class="col-sm-6 col-sm-offset-3">

      <!-- NETLIFY FORM -->
      <form id="bookingForm" name="booking" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="booking">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" name="mobile" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Select Service</label>
          <select name="service" class="form-control" required>
            <option value="">Select Service</option>
            <option>Haircut</option>
            <option>Facial</option>
            <option>Makeup</option>
          </select>
        </div>

        <div class="form-group">
          <label>Appointment Date</label>
          <input type="date" name="date" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success btn-block">
          Confirm Booking
        </button>

        <p class="text-center" style="margin-top:10px;">
          We will contact you shortly to confirm your appointment.
        </p>

      </form>

      <h3 id="result" class="text-center" style="margin-top:20px;"></h3>

    </div>
  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
